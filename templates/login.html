<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - ATLAS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f0f0fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    form {
      background: #ffffff;
      padding: 36px 32px;
      border-radius: 16px;
      border: 0.5px solid #dddcf8;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
    }
    h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; text-align: center; margin-bottom: 24px; }
    label { font-size: 12px; font-weight: 500; color: #777; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    input {
      padding: 10px 13px;
      margin-bottom: 14px;
      border: 0.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #333;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6c63ff; background: #fff; }
    button {
      margin-top: 8px;
      background: #6c63ff;
      color: #ffffff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #574fd6; }
    p.error { color: #e53935; font-size: 13px; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <form action="/login" method="post">
    <h1>Iniciar sesión</h1>
    <label for="email">Correo</label>
    <input id="email" name="email" type="email" autocomplete="email" required />
    <label for="password">Contraseña</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required />
    <button type="submit">Entrar</button>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
  </form>
</body>
</html>
