<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inicio - ATLAS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f0f0fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    section {
      background: #ffffff;
      padding: 36px 32px;
      border-radius: 16px;
      border: 0.5px solid #dddcf8;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
    }
    h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; text-align: center; margin-bottom: 16px; }
    p.nombre { font-size: 17px; font-weight: 600; color: #1a1a2e; text-align: center; margin-bottom: 4px; }
    p.correo { font-size: 14px; color: #777; text-align: center; margin-bottom: 0; }
    a.btn-logout {
      margin-top: 20px;
      text-align: center;
      display: block;
      background: #f4f4ff;
      color: #6c63ff;
      padding: 11px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      border: 0.5px solid #dddcf8;
      transition: background 0.2s;
    }
    a.btn-logout:hover { background: #eae9ff; }
  </style>
</head>
<body>
  <section>
    <h1>¡Bienvenido! 👋</h1>
    <p class="nombre">{{ student.nombre }}</p>
    <p class="correo">{{ student.correo }}</p>
    <a href="/logout" class="btn-logout">Cerrar sesión</a>
  </section>
</body>
</html>
